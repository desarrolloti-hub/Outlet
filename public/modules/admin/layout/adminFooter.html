<!-- ========================================
   ADMIN FOOTER - OUTLET
   Footer minimalista para panel de administración
   TEXTO CENTRADO
   ======================================== -->

<footer class="outlet-admin-footer" id="adminFooter">
    <div class="outlet-admin-footer-gold-line"></div>

    <div class="outlet-admin-footer-content">
        <!-- Copyright centrado -->
        <div class="outlet-admin-footer-copyright">
            <i class="fa-regular fa-copyright"></i>
            <span class="current-year"></span>
            <span>OUTLET</span>
            <span class="outlet-admin-footer-separator">|</span>
            <span>Todos los derechos reservados</span>
            <span class="outlet-admin-badge">Tienda Oficial</span>
        </div>
    </div>
</footer>

<script>
    // Actualizar año automáticamente (fallback)
    document.addEventListener('DOMContentLoaded', function () {
        const year = new Date().getFullYear();
        document.querySelectorAll('.current-year').forEach(el => el.textContent = year);
    });
</script>
