<!-- ========================================
   ADMIN FOOTER - OUTLET
   Footer minimalista para panel de administración
   UNIFICADO CON VARIABLES GLOBALES
   ======================================== -->

<footer class="outlet-admin-footer">
    <div class="outlet-admin-footer-gold-line"></div>
    
    <div class="outlet-admin-footer-content">
        <!-- Marca -->
        <div class="outlet-admin-footer-brand">
            <span class="outlet-admin-brand-name">OUTLET</span>
            <span class="outlet-admin-brand-tag">ADMIN</span>
        </div>
        
        <!-- Copyright -->
        <div class="outlet-admin-footer-copyright">
            <i class="fa-regular fa-copyright"></i>
            <span class="current-year"></span>
            <span>OUTLET</span>
            <span class="outlet-admin-footer-separator">|</span>
            <span>Todos los derechos reservados</span>
            <span class="outlet-admin-badge">Tienda Oficial</span>
        </div>
    </div>
</footer>
<script>
    // Actualizar año automáticamente
    (function() {
        const yearElements = document.querySelectorAll('.current-year');
        const currentYear = new Date().getFullYear();
        yearElements.forEach(el => {
            el.textContent = currentYear;
        });
    })();
</script>
