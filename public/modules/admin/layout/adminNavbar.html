<!-- modules/admin/layout/adminNavbar.html -->
<!-- Botón hamburguesa -->
<button id="adminMobileToggleBtn" class="admin-mobile-toggle" aria-label="Abrir menú">
    <i class="fas fa-bars"></i>
</button>

<!-- Navbar principal -->
<nav class="OUTLET-admin-nav mobile-hidden" id="adminNav">
    <!-- Header -->
    <div class="admin-nav-header">
        <div class="admin-logo">
            <img src="/assets/iconos/outlet_lineado_blanco.png" alt="OUTLET Admin" class="admin-logo-img">
            <span class="admin-logo-text">Admin Panel</span>
        </div>
        <button id="adminCollapseBtn" class="admin-collapse-btn" title="Colapsar menú">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <!-- Usuario -->
    <div class="admin-user-info">
        <div class="admin-avatar">
            <img src="/assets/imagenes/hombre.png" alt="Foto de perfil" class="admin-avatar-img">
            <span class="admin-avatar-badge"></span>
        </div>
        <div class="admin-user-details">
            <span class="admin-user-name" id="adminUserName">Administrador</span>
            <span class="admin-user-email" id="adminUserEmail">admin@outlet.com</span>
        </div>
    </div>

    <!-- Enlaces -->
    <ul class="admin-nav-links">
        <li>
            <a href="/homeAdmin" data-link class="active">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
        </li>
        <li>
            <a href="/readCategories" data-link>
                <i class="fas fa-tags"></i>
                <span>Categorías</span>
            </a>
        </li>
        <li>
            <a href="/readOrders" data-link>
                <i class="fas fa-shopping-cart"></i>
                <span>Pedidos</span>
            </a>
        </li>
        <li>
            <a href="/readUsers" data-link>
                <i class="fas fa-users"></i>
                <span>Usuarios</span>
            </a>
        </li>
        <li>
            <a href="/adminSettings" data-link>
                <i class="fas fa-cog"></i>
                <span>Configuración</span>
            </a>
        </li>
    </ul>

    <!-- Footer -->
    <div class="admin-nav-footer">
        <!-- Botón Tema - Estilo dorado -->
        <button class="admin-theme-toggle" id="adminThemeToggleBtn" title="Cambiar modo oscuro">
            <i class="fas fa-moon"></i>
            <span>Tema</span>
        </button>
        <!-- Botón Cerrar Sesión - Cuadrado y Rojo -->
        <a href="#" id="adminLogoutBtn" class="admin-logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Cerrar Sesión</span>
        </a>
    </div>
</nav>

<!-- Overlay -->
<div id="adminNavOverlay" class="admin-nav-overlay"></div>
