<style>
/* ========================================
   ADMIN NAVBAR - SIN SCROLL, SIN ESPACIOS MUERTOS
   ======================================== */

/* Reset y estructura base */
.OUTLET-admin-nav {

    top: 0;
    left: 0;

    padding: 20px 16px;

}

/* Ocultar scrollbar pero mantener funcionalidad (opcional) */
.OUTLET-admin-nav::-webkit-scrollbar {
    width: 4px;
}

.OUTLET-admin-nav::-webkit-scrollbar-track {
    background: transparent;
}

.OUTLET-admin-nav::-webkit-scrollbar-thumb {
    background: var(--outlet-border-color, #d2c5b0);
    border-radius: 4px;
}

/* Modo oscuro */
body.dark-mode .OUTLET-admin-nav {
    background: #0a1c2f;    /* Fondo oscuro consistente */
    border-right-color: var(--outlet-border-color, #2a4a6e);
}

/* Header - más compacto */
.admin-nav-header {

    align-items: center;
    justify-content: space-between;

}

.admin-logo-img {

    object-fit: contain;
}

.admin-logo-text {

    letter-spacing: 1.5px;

    color: var(--outlet-text-primary, #1f1b13);
}

body.dark-mode .admin-logo-text {
    color: var(--outlet-text-primary, #d6e5f7);
}

.admin-collapse-btn {
    background: transparent;
    border: 1px solid var(--outlet-border-color, #d2c5b0);
    border-radius: var(--outlet-radius-full, 9999px);

    display: flex;

    color: var(--outlet-text-secondary, #4f4635);

    border-color: var(--outlet-gold, #ddab3b);

/* Información del usuario - más compacta */

    flex-shrink: 0;
}

body.dark-mode .admin-user-info {
    background: var(--outlet-bg-container-low, #0f243d);
}

.admin-avatar {
    width: 40px;
    height: 40px;
    background: var(--outlet-gold-gradient, linear-gradient(135deg, #c9a03d, #f2d06b, #fff2a8, #e8c44c, #d4af37));
    border-radius: var(--outlet-radius-full, 9999px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.admin-avatar i {
    font-size: 20px;
    color: #1a1a1a;
}

.admin-user-details {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;            /* Permite que el texto se trunque */
    overflow: hidden;
}

.admin-user-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--outlet-text-primary, #1f1b13);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

body.dark-mode .admin-user-name {
    color: var(--outlet-text-primary, #d6e5f7);
}

.admin-user-email {

    color: var(--outlet-text-secondary, #4f4635);

    overflow: hidden;

.admin-nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    flex: 1;                 /* Ocupa todo el espacio disponible */
    overflow-y: auto;        /* Scroll solo en los enlaces si es necesario */
    overflow-x: hidden;

/* Scroll suave solo en enlaces */
.admin-nav-links::-webkit-scrollbar {
    width: 3px;
}

.admin-nav-links::-webkit-scrollbar-track {
    background: transparent;
}

.admin-nav-links::-webkit-scrollbar-thumb {

    border-radius: 3px;

    align-items: center;
    gap: 12px;

    color: var(--outlet-text-secondary, #4f4635);

}

.admin-theme-toggle {

    border: 1px solid var(--outlet-border-color, #d2c5b0);

.admin-theme-toggle:hover {

    color: #1a1a1a;
    border-color: var(--outlet-gold, #ddab3b);
}

.admin-theme-toggle i {

}

.admin-theme-toggle span {

}

.admin-logout-btn {

    color: var(--outlet-danger, #ba1a1a);
    transition: all var(--outlet-transition-fast, 0.2s ease);
}

.admin-logout-btn i {
    width: 20px;
    font-size: 16px;
}

.admin-logout-btn span {
    font-size: 13px;
    font-weight: 500;
}

.admin-logout-btn:hover {
    background: rgba(186, 26, 26, 0.1);
    color: var(--outlet-danger, #ba1a1a);
}

/* ========== ESTADO COLAPSADO ========== */
.OUTLET-admin-nav.collapsed {
    width: 80px;
    min-width: 80px;
}

.OUTLET-admin-nav.collapsed .admin-logo-text,
.OUTLET-admin-nav.collapsed .admin-user-details,
.OUTLET-admin-nav.collapsed .admin-nav-links span,
.OUTLET-admin-nav.collapsed .admin-theme-toggle span,
.OUTLET-admin-nav.collapsed .admin-logout-btn span {
    display: none;
}

.OUTLET-admin-nav.collapsed .admin-nav-links li a {
    justify-content: center;
    padding: 10px;
}

.OUTLET-admin-nav.collapsed .admin-nav-links li a i {
    margin-right: 0;
    font-size: 18px;
}

.OUTLET-admin-nav.collapsed .admin-logout-btn {
    justify-content: center;
}

.OUTLET-admin-nav.collapsed .admin-logout-btn i {
    margin-right: 0;
}

.OUTLET-admin-nav.collapsed .admin-user-info {
    justify-content: center;
}

.OUTLET-admin-nav.collapsed .admin-avatar {
    margin: 0 auto;
}

.OUTLET-admin-nav.collapsed .admin-theme-toggle {

    padding: 8px;
}

/* ========== RESPONSIVE MÓVIL ========== */
@media (max-width: 768px) {
    .OUTLET-admin-nav {
        transform: translateX(-100%);
        width: 260px !important;
        min-width: 260px !important;
        z-index: 1050;
    }
    
    .OUTLET-admin-nav.open {
        transform: translateX(0);
    }
    
    .OUTLET-admin-nav.collapsed {
        width: 260px !important;
        min-width: 260px !important;
    }
    
    .OUTLET-admin-nav.collapsed .admin-logo-text,
    .OUTLET-admin-nav.collapsed .admin-user-details,
    .OUTLET-admin-nav.collapsed .admin-nav-links span,
    .OUTLET-admin-nav.collapsed .admin-theme-toggle span,
    .OUTLET-admin-nav.collapsed .admin-logout-btn span {
        display: inline-block;
    }
    
    .OUTLET-admin-nav.collapsed .admin-nav-links li a {
        justify-content: flex-start;
        padding: 10px 12px;
    }
    
    .OUTLET-admin-nav.collapsed .admin-nav-links li a i {
        margin-right: 12px;
        font-size: 16px;
    }
    
    .OUTLET-admin-nav.collapsed .admin-user-info {
        justify-content: flex-start;
    }
    
    .OUTLET-admin-nav.collapsed .admin-avatar {
        margin: 0;
    }
    
    .OUTLET-admin-nav.collapsed .admin-theme-toggle {
        justify-content: center;
    }
}

/* Botón móvil para abrir menú */
.admin-mobile-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1040;
    background: var(--outlet-gold, #ddab3b);
    border: none;
    width: 48px;
    height: 48px;
    border-radius: var(--outlet-radius-full, 9999px);
    cursor: pointer;
    box-shadow: var(--outlet-shadow-md, 0 5px 15px rgba(0, 0, 0, 0.08));
    align-items: center;
    justify-content: center;
}

@media (max-width: 768px) {
    .admin-mobile-toggle {
        display: flex;
    }
    
    .admin-mobile-toggle i {
        font-size: 20px;
        color: #1a1a1a;
    }
}
</style>

<!-- Botón móvil para abrir menú -->
<button class="admin-mobile-toggle" id="adminMobileToggleBtn">
    <i class="fas fa-bars"></i>
</button>

<script>
    (function() {
        const adminNav = document.querySelector('.OUTLET-admin-nav');
        const mobileToggle = document.getElementById('adminMobileToggleBtn');
        const collapseBtn = document.getElementById('adminCollapseBtn');
        
        // Toggle móvil
        if (mobileToggle && adminNav) {
            mobileToggle.addEventListener('click', () => {
                adminNav.classList.toggle('open');
            });
            
            // Cerrar al hacer clic fuera en móvil
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    if (adminNav && !adminNav.contains(e.target) && !mobileToggle.contains(e.target)) {
                        adminNav.classList.remove('open');
                    }
                }
            });
        }
        
        // Colapsar/expandir en desktop
        if (collapseBtn && adminNav) {
            collapseBtn.addEventListener('click', () => {
                adminNav.classList.toggle('collapsed');
            });
        }
        
        // Evitar que el body tenga scroll cuando el navbar está abierto en móvil
        if (adminNav) {
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'class') {
                        if (adminNav.classList.contains('open')) {
                            document.body.style.overflow = 'hidden';
                        } else {
                            document.body.style.overflow = '';
                        }
                    }
                });
            });
            observer.observe(adminNav, { attributes: true });
        }
    })();
</script>
