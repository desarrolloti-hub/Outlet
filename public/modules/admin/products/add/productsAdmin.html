<!-- ========================================
   PRODUCTS FORM - OUTLET (SPA)
   Formulario para agregar/editar productos
   ======================================== -->

<main class="products-admin-container">
    <!-- HEADER -->
    <header class="products-topbar">
        <div>
            <h1 id="formTitle">Agregar Producto</h1>
            <p class="products-subtitle">Completa la información para añadir un nuevo producto al catálogo</p>
        </div>
        <div class="products-header-actions">
            <button class="products-btn-secondary" id="backToAdminBtn">
                <i class="fa-solid fa-arrow-left"></i>
                Volver
            </button>
        </div>
    </header>

    <!-- FORMULARIO -->
    <form id="productForm" class="products-form">
        <!-- INFORMACIÓN BÁSICA -->
        <div class="products-form-card">
            <div class="products-card-header">
                <i class="fa-solid fa-info-circle"></i>
                <h2>Información Básica</h2>
            </div>

            <div class="products-form-grid">
                <div class="products-form-group">
                    <label>Nombre del producto *</label>
                    <input type="text" id="name" placeholder="Ej: Vestido de Seda Noir" required>
                </div>

                <div class="products-form-group">
                    <label>Slug</label>
                    <input type="text" id="slug" placeholder="vestido-de-seda-noir">
                    <small>URL amigable (se genera automáticamente)</small>
                </div>

                <div class="products-form-group full-width">
                    <label>Descripción</label>
                    <textarea id="description" placeholder="Describe el producto..."></textarea>
                </div>

                <div class="products-form-group">
                    <label>Marca</label>
                    <input type="text" id="brand" placeholder="Ej: Maison Luxe, Atelier Noir">
                </div>

                <div class="products-form-group">
                    <label>Categoría</label>
                    <input type="text" id="category" placeholder="Ej: Ropa, Calzado, Accesorios">
                </div>

                <div class="products-form-group">
                    <label>Subcategoría</label>
                    <input type="text" id="subcategory" placeholder="Ej: Vestidos, Blazers, Bolsos">
                </div>

                <div class="products-form-group">
                    <label>Género</label>
                    <select id="gender">
                        <option value="Mujer">Mujer</option>
                        <option value="Hombre">Hombre</option>
                        <option value="Unisex">Unisex</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- PRECIOS -->
        <div class="products-form-card">
            <div class="products-card-header">
                <i class="fa-solid fa-dollar-sign"></i>
                <h2>Precios</h2>
            </div>

            <div class="products-form-grid">
                <div class="products-form-group">
                    <label>Precio de venta (€)</label>
                    <input type="number" id="salePrice" placeholder="0.00" step="0.01">
                </div>

                <div class="products-form-group">
                    <label>Precio de compra (€)</label>
                    <input type="number" id="purchasePrice" placeholder="0.00" step="0.01">
                </div>

                <div class="products-form-group">
                    <label>Descuento (%)</label>
                    <input type="number" id="discount" placeholder="0" min="0" max="100">
                </div>
            </div>
        </div>

        <!-- IMÁGENES -->
        <div class="products-form-card">
            <div class="products-card-header">
                <i class="fa-solid fa-image"></i>
                <h2>Imágenes</h2>
            </div>

            <div class="products-form-grid">
                <div class="products-form-group full-width">
                    <label>Imagen principal (URL)</label>
                    <input type="text" id="mainImage" placeholder="https://...">
                    <small>Pega la URL de la imagen principal</small>
                </div>

                <div class="products-form-group full-width">
                    <label>Imágenes extra (separadas por comas)</label>
                    <input type="text" id="extraImages" placeholder="url1.jpg, url2.jpg, url3.jpg">
                    <small>Ingresa las URLs separadas por comas</small>
                </div>
            </div>
        </div>

        <!-- ESPECIFICACIONES -->
        <div class="products-form-card">
            <div class="products-card-header">
                <i class="fa-solid fa-tag"></i>
                <h2>Especificaciones</h2>
            </div>

            <div class="products-form-grid">
                <div class="products-form-group">
                    <label>Colores (separados por comas)</label>
                    <input type="text" id="colors" placeholder="Negro, Blanco, Dorado">
                </div>

                <div class="products-form-group">
                    <label>Tallas (separadas por comas)</label>
                    <input type="text" id="sizes" placeholder="XS, S, M, L, XL">
                </div>

                <div class="products-form-group">
                    <label>Material</label>
                    <input type="text" id="material" placeholder="Ej: Seda, Algodón, Lana">
                </div>

                <div class="products-form-group">
                    <label>Tipo de ajuste</label>
                    <input type="text" id="fitType" placeholder="Ej: Regular, Slim, Oversize">
                </div>

                <div class="products-form-group">
                    <label>Composición</label>
                    <input type="text" id="composition" placeholder="Ej: 100% Seda">
                </div>

                <div class="products-form-group">
                    <label>Peso (g)</label>
                    <input type="number" id="weight" placeholder="0">
                </div>

                <div class="products-form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" placeholder="0">
                </div>
            </div>
        </div>

        <!-- BOTÓN GUARDAR -->
        <button type="submit" class="products-save-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Guardar Producto
        </button>
    </form>
</main>

<!-- Toast notification -->
<div class="products-toast" id="productsToast" style="display: none;">
    <span id="toastMessage"></span>
</div>
