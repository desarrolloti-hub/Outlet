<!-- ========================================
   ADMIN PANEL - OUTLET (SPA) - REDISEÑO PREMIUM
   Panel administrativo minimalista y lujoso
   ======================================== -->

<main class="admin-dashboard">
    <!-- CONTENIDO PRINCIPAL -->
    <div class="admin-main-content">
        <header class="admin-topbar">
            <div class="admin-title-section">
                <h1>Panel de Control</h1>
                <span class="admin-badge">Administrador</span>
            </div>
            <div class="admin-info">
                <div class="admin-user-details">
                    <span class="admin-user-name">María González</span>
                    <span class="admin-user-role">Gerente General</span>
                </div>
                <div class="admin-avatar">
                    <img src="https://i.pravatar.cc/100?img=7" alt="admin">
                </div>
                <button class="admin-logout-btn" id="logoutBtn" title="Cerrar sesión">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <!-- CARDS ESTADÍSTICAS REDISEÑADAS -->
        <section class="admin-cards">
            <div class="admin-card">
                <div class="card-icon">
                    <i class="fa-regular fa-gem"></i>
                </div>
                <div class="card-info">
                    <h3 id="productsCount">0</h3>
                    <p>Productos</p>
                </div>
            </div>
            <div class="admin-card">
                <div class="card-icon">
                    <i class="fa-regular fa-user"></i>
                </div>
                <div class="card-info">
                    <h3 id="usersCount">0</h3>
                    <p>Usuarios</p>
                </div>
            </div>
            <div class="admin-card">
                <div class="card-icon">
                    <i class="fa-regular fa-rectangle-list"></i>
                </div>
                <div class="card-info">
                    <h3 id="ordersCount">0</h3>
                    <p>Pedidos</p>
                </div>
            </div>
            <div class="admin-card">
                <div class="card-icon">
                    <i class="fa-regular fa-chart-line"></i>
                </div>
                <div class="card-info">
                    <h3 id="salesCount">$0</h3>
                    <p>Ventas</p>
                </div>
            </div>
        </section>

        <!-- TABLA DE PRODUCTOS REDISEÑADA -->
        <section class="admin-table-section">
            <div class="admin-table-header">
                <div>
                    <h2>Catálogo de Productos</h2>
                    <p class="table-subtitle">Gestión de inventario y precios</p>
                </div>
                <button id="addProductBtn" class="admin-add-btn">
                    <i class="fa-regular fa-plus"></i> Agregar producto
                </button>
            </div>

            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<!-- Modal rediseñado para agregar/editar producto -->
<div class="admin-modal" id="productModal" style="display: none;">
    <div class="admin-modal-content">
        <div class="admin-modal-header">
            <h3 id="modalTitle">Agregar Producto</h3>
            <button class="admin-modal-close" id="closeModalBtn">
                <i class="fa-regular fa-times"></i>
            </button>
        </div>
        <div class="admin-modal-body">
            <div class="admin-form-group">
                <label>Nombre del producto</label>
                <input type="text" id="productName" placeholder="Ej: Vestido de Seda Noir">
            </div>
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label>Precio (€)</label>
                    <input type="number" id="productPrice" placeholder="0.00">
                </div>
                <div class="admin-form-group">
                    <label>Stock</label>
                    <input type="number" id="productStock" placeholder="0">
                </div>
            </div>
            <div class="admin-form-group">
                <label>URL de imagen</label>
                <input type="text" id="productImage" placeholder="https://...">
            </div>
            <div class="admin-form-group">
                <label>Estado</label>
                <div class="admin-status-select">
                    <select id="productStatus">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn-cancel" id="cancelModalBtn">Cancelar</button>
            <button class="admin-btn-save" id="saveProductBtn">Guardar cambios</button>
        </div>
    </div>
</div>
