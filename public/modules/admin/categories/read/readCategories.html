<!-- ========================================
   READ CATEGORIES - OUTLET ADMIN
   Página para listar y gestionar categorías
   ======================================== -->

<main class="categorieslist-container">
    <!-- Header -->
    <div class="categorieslist-header">
        <div>
            <h1 class="categorieslist-title">Gestión de Categorías</h1>
            <p class="categorieslist-subtitle">Administra las categorías de productos</p>
        </div>
        <button class="categorieslist-btn-add" id="addCategoryBtn">
            <i class="material-symbols-outlined">add</i>
            <span>Nueva Categoría</span>
        </button>
    </div>

    <!-- Tabla de categorías -->
    <div class="categorieslist-table-container">
        <div class="categorieslist-table-wrapper">
            <table class="categorieslist-table">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Slug</th>
                        <th>Subcategorías</th>
                        <th>Orden</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="categoriesTableBody">
                    <tr>
                        <td colspan="8" class="categorieslist-loading">
                            <div class="categorieslist-spinner"></div>
                            <span>Cargando categorías...</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal de confirmación para eliminar -->
<div class="categorieslist-modal" id="deleteModal" style="display: none;">
    <div class="categorieslist-modal-content">
        <div class="categorieslist-modal-header">
            <h3>Confirmar eliminación</h3>
            <button class="categorieslist-modal-close" id="closeDeleteModalBtn">&times;</button>
        </div>
        <div class="categorieslist-modal-body">
            <p>¿Estás seguro de que deseas eliminar <strong id="deleteItemName"></strong>?</p>
            <p class="categorieslist-modal-warning">Esta acción no se puede deshacer.</p>
        </div>
        <div class="categorieslist-modal-footer">
            <button class="categorieslist-btn-cancel" id="cancelDeleteBtn">Cancelar</button>
            <button class="categorieslist-btn-danger" id="confirmDeleteBtn">Eliminar</button>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="categoriesToast" class="categorieslist-toast" style="display: none;"></div>
