<!-- ========================================
   VERIFICAR EMAIL - OUTLET
   Fragmento para SPA
   ======================================== -->

<div class="outlet-verification-main">
    <div class="outlet-verification-container">
        <div class="outlet-verification-card">
            
            <!-- Logo -->
            <div class="outlet-verification-logo">
                <img src="/public/assets/logo/outlet_logo.svg" alt="OUTLET Logo" onerror="this.src='/img/logo-recortado.jpg'">
            </div>
            
            <!-- Contenido dinámico -->
            <div id="verificationContent">
                <!-- Estado de carga inicial -->
                <div class="outlet-loading-state">
                    <div class="outlet-spinner"></div>
                    <p>Verificando tu correo electrónico...</p>
                </div>
            </div>
            
            <!-- Línea decorativa dorada -->
            <div class="outlet-verification-divider">
                <span></span>
                <i class="fas fa-gem"></i>
                <span></span>
            </div>
            
            <p class="outlet-verification-footer">OUTLET · Colección Exclusiva</p>
        </div>
    </div>
</div>
