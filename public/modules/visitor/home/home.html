<!-- ========================================
   HOME PAGE - OUTLET (VERSIÓN UNIFICADA)
   Basado en index.html + home.html
   ======================================== -->

<!-- Navegación Rápida de Categorías -->
<section class="category-nav">
    <div class="container">
        <div class="category-grid" id="categories-container">
            <!-- Las categorías se cargarán dinámicamente con JS -->
        </div>
    </div>
</section>

<!-- Sección Hero -->
<section class="hero">
    <img id="hero-img" src="public/assets/imagenes/vestido.png" alt="Hero">
    <div class="hero-content">
        <span class="hero-tag">SEASON 2024</span>
        <h2 class="hero-title">The Noir<br><span class="luxury-stroke">Hierarchy</span></h2>
        <p class="hero-desc">Architectural precision. Curated for the modern silhouette.</p>
        <button class="btn-primary" id="shopNowBtn">Shop The Drop</button>
    </div>
    <div class="coupon-widget">
        <div class="coupon-card">
            <div class="coupon-header">
                <i class="fas fa-ticket-alt"></i>
                <span class="label-caps">COUPON CENTER</span>
            </div>
            <div class="coupon-offer">
                <p class="body-sm" style="font-weight:bold;">$20 OFF</p>
                <p class="body-sm">On orders over $100</p>
            </div>
            <button class="btn-coupon" id="claimRewardsBtn">Claim Rewards</button>
        </div>
    </div>
</section>

<!-- Venta Flash -->
<section class="flash-sale">
    <div class="flash-header">
        <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
            <span class="flash-badge">FLASH SALE</span>
            <h3 class="headline-md">MIDNIGHT ARCHIVE</h3>
            <div class="timer">
                <span>Ends In</span>
                <span id="timerDisplay">02:45:12</span>
            </div>
        </div>
        <a href="/sale" class="view-all-offers" data-link>VIEW ALL OFFERS</a>
    </div>
    <div class="product-grid" id="flash-sale-container">
        <!-- Productos flash sale se cargarán dinámicamente -->
    </div>
</section>

<!-- Tendencias Ahora -->
<section class="trending">
    <div class="container">
        <div class="section-header">
            <div>
                <h2 class="headline-md">Trending Now</h2>
                <p class="body-sm">Top pieces curated for the season.</p>
            </div>
            <button class="btn-primary shop-all-btn" id="shopAllBtn" style="background:black; color:white;">Shop All</button>
        </div>
        <div class="trending-grid" id="trending-container">
            <!-- Productos trending se cargarán dinámicamente -->
        </div>
    </div>
</section>
<!-- Galería -->
<section class="gallery">
    <div class="container">
        <h2 class="headline-md" style="text-align:center; margin-bottom:48px;">#MAISONSTYLE GALLERY</h2>
        <div class="gallery-grid" id="gallery-container">
            <!-- Imágenes de galería se cargarán dinámicamente -->
        </div>
    </div>
</section>
