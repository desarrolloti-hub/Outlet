<!-- ========================================
   VISTA DE CREAR CUENTA - OUTLET
   Página de creación de cuenta / registro
   ======================================== -->

<main class="outlet-account-container">
    <div class="outlet-account-layout">
        
        <!-- Panel izquierdo: Imagen editorial -->
        <div class="outlet-account-panel-image">
            <div class="outlet-account-overlay"></div>
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCnMLNNq0g8dgpfrVVcR_M__UcLNO4U3sDVlaOpvmPLkIbyCNRZzg5tThkRS2Ozv_HUAcDSLy208tz74S8N2boaacvVwbbtaJniZhidSo_9_U5hN6wiE2z-GYOVnNe5WCr6vFNnp7SV2T8pqsXTOfzOUvZ7JYQw9mczBJrGKT5JKeAesCbreWbYmyxjecEp3GLezIboPHYNsc7ochGRlVQjk0oQVVXVK5_RT0T5cAbtFhj0KmEq3XebNrsC5ZUeb9_ikCiCsR69J7n" alt="Modelo de Moda de Lujo de Alta Costura" class="outlet-account-bg-image" loading="lazy">
            
            <div class="outlet-account-floating-text">
                <h2>ÚNETE AL ARCHIVO.</h2>
                <p>Acceso anticipado a colecciones, eventos exclusivos y más.</p>
            </div>
        </div>
        
        <!-- Panel derecho: Formulario de registro -->
        <div class="outlet-account-panel-form">
            <div class="outlet-account-form-content">
                <div class="outlet-account-header">
                    <p class="outlet-account-badge">CREAR CUENTA</p>
                    <h1>Nuevo Miembro</h1>
                </div>
                
                <form class="outlet-account-form" id="createAccountForm">
                    <!-- Nombre completo -->
                    <div class="outlet-account-form-group">
                        <label>NOMBRE COMPLETO</label>
                        <input type="text" placeholder="Ana García" id="fullname" autocomplete="name">
                        <div class="outlet-account-error" id="errorFullname"></div>
                    </div>
                    
                    <!-- Correo electrónico -->
                    <div class="outlet-account-form-group">
                        <label>CORREO ELECTRÓNICO</label>
                        <input type="email" placeholder="nombre@archivo.com" id="email" autocomplete="email">
                        <div class="outlet-account-error" id="errorEmail"></div>
                    </div>
                    
                    <!-- Teléfono (opcional) -->
                    <div class="outlet-account-form-group">
                        <label>TELÉFONO <span class="outlet-account-optional">(OPCIONAL)</span></label>
                        <input type="tel" placeholder="+34 123 456 789" id="phone" autocomplete="tel">
                    </div>
                    
                    <!-- Contraseña -->
                    <div class="outlet-account-form-group">
                        <label>CONTRASEÑA</label>
                        <input type="password" placeholder="••••••••" id="password" autocomplete="new-password">
                        <div class="outlet-account-error" id="errorPassword"></div>
                        <div class="outlet-account-password-requirements" id="passwordRequirements">
                            <span class="outlet-account-req" id="reqLength">✗ Mín. 8 caracteres</span>
                            <span class="outlet-account-req" id="reqUppercase">✗ Una mayúscula</span>
                            <span class="outlet-account-req" id="reqNumber">✗ Un número</span>
                        </div>
                    </div>
                    
                    <!-- Confirmar contraseña -->
                    <div class="outlet-account-form-group">
                        <label>CONFIRMAR CONTRASEÑA</label>
                        <input type="password" placeholder="••••••••" id="confirmPassword" autocomplete="off">
                        <div class="outlet-account-error" id="errorConfirm"></div>
                    </div>
                    
                    <!-- Términos y condiciones -->
                    <div class="outlet-account-form-options">
                        <label class="outlet-account-checkbox">
                            <input type="checkbox" id="terms">
                            <span>ACEPTO LOS <a href="#" id="termsLink">TÉRMINOS Y CONDICIONES</a></span>
                        </label>
                    </div>
                    
                    <!-- Boletín informativo -->
                    <div class="outlet-account-form-options">
                        <label class="outlet-account-checkbox">
                            <input type="checkbox" id="newsletter" checked>
                            <span>RECIBIR NOTICIAS Y OFERTAS EXCLUSIVAS</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="outlet-account-btn-submit" id="submitBtn">
                        <span>CREAR CUENTA</span>
                    </button>
                </form>
                
                <div class="outlet-account-login-link">
                    <p>¿Ya tienes una cuenta?</p>
                    <button class="outlet-account-btn-login" id="loginBtn">
                        INICIAR SESIÓN
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>
